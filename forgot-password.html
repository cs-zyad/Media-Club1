<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | نادي الإعلام والإنتاج السينمائي</title>
    <meta name="description" content="استعادة حسابك وكلمة المرور الخاصة بك.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-body">
    <a href="login.html" class="back-home">
        <i class="fas fa-arrow-right"></i>
        العودة للدخول
    </a>

    <div class="auth-page">
        <!-- Ambient background effects -->
        <div class="ambient-circle circle-1" style="background: var(--primary-deep); opacity: 0.8;"></div>

        <div class="auth-card">
            <a href="index.html">
                <img src="assets/logo2.png" alt="Logo" class="auth-logo">
            </a>
            
            <h1 class="auth-title" style="font-size: 1.8rem;">نسيت كلمة المرور؟</h1>
            <p class="auth-desc" style="line-height: 1.6;">أدخل بريدك الإلكتروني أدناه، وسنرسل لك رابطاً لإعادة تعيين كلمة المرور الخاصة بك.</p>

            <form action="login.html" class="auth-form" onsubmit="event.preventDefault(); alert('تم إرسال رابط استعادة كلمة المرور إلى بريدك!'); window.location.href='login.html';">
                
                <div class="form-group" style="margin-bottom: 30px;">
                    <input type="email" class="form-input" placeholder="البريد الإلكتروني" required>
                    <i class="fas fa-envelope"></i>
                </div>

                <button type="submit" class="btn btn-primary btn-auth">إرسال الرابط</button>
                
                <p class="auth-footer" style="margin-top: 15px;">
                    هل تذكرت كلمة المرور؟ <a href="login.html" class="auth-link">تسجيل الدخول</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
