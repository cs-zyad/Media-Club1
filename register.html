<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | نادي الإعلام والإنتاج السينمائي</title>
    <meta name="description" content="انضم إلينا وابدأ رحلتك في الإنتاج السينمائي والمحتوى الإعلامي.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-body">
    <a href="index.html" class="back-home">
        <i class="fas fa-arrow-right"></i>
        العودة للرئيسية
    </a>

    <div class="auth-page">
        <!-- Ambient background effects -->
        <div class="ambient-circle circle-1"></div>
        <div class="ambient-circle circle-2" style="background: var(--secondary-light); opacity: 0.15;"></div>

        <div class="auth-card">
            <a href="index.html">
                <img src="assets/logo2.png" alt="Logo" class="auth-logo">
            </a>
            
            <h1 class="auth-title">إنشاء حساب</h1>
            <p class="auth-desc">خطوتك الأولى لتكون جزءاً من مجتمعنا الإبداعي.</p>

            <form action="index.html" class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="الاسم الكامل" required>
                    <i class="fas fa-user"></i>
                </div>

                <div class="form-group">
                    <input type="email" class="form-input" placeholder="البريد الإلكتروني الجامعي" required>
                    <i class="fas fa-envelope"></i>
                </div>
                
                <div class="form-group">
                    <input type="password" class="form-input" placeholder="كلمة المرور" required>
                    <i class="fas fa-lock"></i>
                </div>

                <div class="form-group">
                    <input type="password" class="form-input" placeholder="تأكيد كلمة المرور" required>
                    <i class="fas fa-lock"></i>
                </div>

                <button type="submit" class="btn btn-primary btn-auth" style="margin-top: 15px;">تسجيل</button>
                
                <p class="auth-footer">
                    لديك حساب بالفعل؟ <a href="login.html" class="auth-link">تسجيل الدخول</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
